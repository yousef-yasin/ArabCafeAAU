{% extends 'base.html' %}
{% block content %}
<div class="container py-4">
  <div class="login-card mx-auto">
    <div class="text-center mb-4">
      <img src="{{ url_for('media_logo') }}" class="login-logo" alt="logo">
      <h2 class="mt-3 mb-1">دخول الكافتيريا</h2>
      <p class="text-muted mb-0">الطلبات، الطباعة، التقارير، وتعديل المنيو بالكامل من الداتا بيس.</p>
    </div>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">اسم المستخدم</label>
        <input type="text" class="form-control form-control-lg rounded-4" name="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">كلمة المرور</label>
        <input type="password" class="form-control form-control-lg rounded-4" name="password" required>
      </div>
      <button class="btn btn-warning btn-lg w-100 rounded-pill fw-bold">دخول</button>
    </form>
  </div>
</div>
{% endblock %}
